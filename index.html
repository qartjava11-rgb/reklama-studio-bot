<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reklama Studio Premium App</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* iOS Light Mode Global Stillari */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #F2F2F7;
            color: #1C1C1E;
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Navigatsiya */
        .ios-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .ios-header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .settings-btn {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.2s ease;
        }

        .settings-btn:active {
            transform: scale(0.9);
        }

        /* Dinamik Qarz Bildirishnomasi (iOS Alert Banner) */
        .ios-debt-alert {
            background: #FFD60A;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            animation: slideDown 0.3s ease;
        }

        .ios-debt-alert p {
            font-size: 14px;
            font-weight: 600;
            color: #1C1C1E;
        }

        /* Kvadrat m² Vidjetlari */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #FFFFFF;
            border-radius: 14px;
            padding: 14px 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .stat-card .title {
            font-size: 11px;
            font-weight: 600;
            color: #8E8E93;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-card .value {
            font-size: 16px;
            font-weight: 700;
            color: #007AFF;
        }

        /* iOS Segmented Control */
        .segmented-control {
            display: flex;
            background: #E5E5EA;
            border-radius: 9px;
            padding: 2px;
            margin-bottom: 20px;
        }

        .segment-item {
            flex: 1;
            background: none;
            border: none;
            padding: 8px 0;
            font-size: 13px;
            font-weight: 600;
            color: #1C1C1E;
            cursor: pointer;
            border-radius: 7px;
            transition: all 0.2s ease;
        }

        .segment-item.active {
            background: #FFFFFF;
            box-shadow: 0 3px 8px rgba(0,0,0,0.12);
        }

        /* Formalar Guruhi (Oq blok) */
        .ios-form-group {
            background: #FFFFFF;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .ios-input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 0.5px solid #E5E5EA;
        }

        .ios-input-row:last-child {
            border-bottom: none;
        }

        .ios-input-row label {
            font-size: 16px;
            font-weight: 500;
        }

        .ios-input-row input, .ios-input-row select {
            border: none;
            outline: none;
            font-size: 16px;
            color: #007AFF;
            text-align: right;
            width: 55%;
            background: transparent;
        }

        .ios-input-row input::placeholder {
            color: #C7C7CC;
        }

        /* Real vaqt hisob oynasi */
        .quick-result-box {
            background: #E4F2FF;
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            margin-bottom: 20px;
        }

        .quick-result-box p {
            font-size: 15px;
            font-weight: 600;
            color: #007AFF;
        }

        /* iOS Tugmalari */
        .ios-btn-primary {
            background: #007AFF;
            color: #FFFFFF;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,122,255,0.15);
            transition: all 0.2s ease;
        }

        .ios-btn-primary:active {
            transform: scale(0.97);
            background: #0063CC;
        }

        /* Yon tarafdagi Admin Panel */
        .side-settings-panel {
            position: fixed;
            top: 0;
            left: -100%;
            width: 85%;
            max-width: 360px;
            height: 100%;
            background: #F2F2F7;
            box-shadow: 5px 0 25px rgba(0,0,0,0.15);
            z-index: 100;
            transition: left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            padding: 20px 16px;
            overflow-y: auto;
        }

        .side-settings-panel.open {
            left: 0;
        }

        .panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            z-index: 99;
            display: none;
        }

        .panel-overlay.show {
            display: block;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 12px;
            color: #8E8E93;
            text-transform: uppercase;
            font-weight: 600;
            margin: 16px 0 6px 8px;
        }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="panel-overlay" id="overlay"></div>

    <!-- Admin Panel (Sozlamalar + Qarz Boshqaruvi) -->
    <div class="side-settings-panel" id="settingsPanel">
        <div class="panel-header">
            <h2>⚙️ Admin Panel</h2>
            <button style="color:#007AFF; background:none; border:none; font-size:16px; font-weight:600; cursor:pointer;" id="closePanel">Tayyor</button>
        </div>

        <!-- TEPADAGI QARZ BILDIRISHNOMASI -->
        <div class="ios-debt-alert" id="panelDebtAlert">
            <p>⚠️ Qarzlar mavjud!</p>
        </div>
        
        <div class="section-title">Material Narxlari (1 m²)</div>
        <div class="ios-form-group">
            <div class="ios-input-row">
                <label>Banner</label>
                <input type="number" id="price-banner" placeholder="30000">
            </div>
            <div class="ios-input-row">
                <label>Arakal</label>
                <input type="number" id="price-arakal" placeholder="35000">
            </div>
            <div class="ios-input-row">
                <label>Setka</label>
                <input type="number" id="price-setka" placeholder="40000">
            </div>
        </div>
        <button class="ios-btn-primary" id="savePricesBtn" style="padding:12px; font-size:15px; margin-bottom:10px;">Narxlarni Saqlash</button>

        <div class="section-title">Yangi Qarz Qo'shish</div>
        <div class="ios-form-group">
            <div class="ios-input-row">
                <label>Mijoz ismi</label>
                <input type="text" id="debt-client" placeholder="Ism familiya">
            </div>
            <div class="ios-input-row">
                <label>Qarz summasi</label>
                <input type="number" id="debt-amount" placeholder="0">
            </div>
        </div>
        <button class="ios-btn-primary" id="saveDebtBtn" style="padding:12px; font-size:15px; background:#FF3B30;">Qarzni Yuklash</button>
    </div>

    <!-- Asosiy Interfeys -->
    <div class="ios-header">
        <h1>Buyurtma</h1>
        <button class="settings-btn" id="openPanel">⚙️</button>
    </div>

    <!-- ASOSIY EKRANDAGI BILDIRISHNOMA -->
    <div class="ios-debt-alert" id="mainDebtAlert">
        <p id="mainDebtText">⚠️ Diqqat: Tizimda to'lanmagan qarzlar bor!</p>
    </div>

    <!-- Statistika Vidjetlari -->
    <div class="stats-container">
        <div class="stat-card">
            <div class="title">Banner</div>
            <div class="value" id="stat-banner">0.00 m²</div>
        </div>
        <div class="stat-card">
            <div class="title">Arakal</div>
            <div class="value" id="stat-arakal">0.00 m²</div>
        </div>
        <div class="stat-card">
            <div class="title">Setka</div>
            <div class="value" id="stat-setka">0.00 m²</div>
        </div>
    </div>

    <!-- Material Tanlash -->
    <div class="segmented-control">
        <button class="segment-item active" data-material="banner">Banner</button>
        <button class="segment-item" data-material="arakal">Arakal</button>
        <button class="segment-item" data-material="setka">Setka</button>
    </div>

    <!-- O'lcham kiritish -->
    <div class="ios-form-group">
        <div class="ios-input-row">
            <label>Mijoz ismi</label>
            <input type="text" id="input-client" placeholder="Mijoz nomi">
        </div>
        <div class="ios-input-row">
            <label>Eni (sm)</label>
            <input type="number" id="input-eni" placeholder="0" inputmode="numeric">
        </div>
        <div class="ios-input-row">
            <label>Boyi (sm)</label>
            <input type="number" id="input-boyi" placeholder="0" inputmode="numeric">
        </div>
        <div class="ios-input-row">
            <label>Holati</label>
            <select id="input-status">
                <option value="To'landi">To'landi</option>
                <option value="Qarz">Qarz yozish</option>
            </select>
        </div>
    </div>

    <div class="quick-result-box" id="quickResult">
        <p>O'lchamlarni kiriting...</p>
    </div>

    <button class="ios-btn-primary" id="submitOrderBtn">Buyurtmani Yuklash</button>

    <script>
        // --- TO'LIQ VA TO'G'RI SUPABASE SOZLAMALARI ---
        const SUPABASE_URL = "https://gsddtlnpuwqjyadovshp.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ZxsMtYclbSrGigXep40XYQ_g0OJG9rE";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let dbPrices = { banner: 30000, arakal: 35000, setka: 40000 };
        let activeMaterial = "banner";

        // DOM Elementlari
        const panel = document.getElementById('settingsPanel');
        const overlay = document.getElementById('overlay');
        const eniInput = document.getElementById('input-eni');
        const boyiInput = document.getElementById('input-boyi');
        const clientInput = document.getElementById('input-client');
        const statusSelect = document.getElementById('input-status');
        const quickResult = document.getElementById('quickResult');

        // Navigatsiya ochish va yopish
        function openSettings() {
            panel.classList.add('open');
            overlay.classList.add('show');
            checkDebts(); // Admin panel ochilganda qarzlarni qayta tekshirish
        }

        function closeSettings() {
            panel.classList.remove('open');
            overlay.classList.remove('show');
        }

        document.getElementById('openPanel').addEventListener('click', openSettings);
        document.getElementById('closePanel').addEventListener('click', closeSettings);
        overlay.addEventListener('click', closeSettings);

        // Telefonda mobil surish (Swipe Gesture)
        let touchStartX = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
        document.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchStartX < 50 && (touchEndX - touchStartX) > 80) { openSettings(); }
        });

        // Segmented Control material almashtirish
        document.querySelectorAll('.segment-item').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.segment-item').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                activeMaterial = this.getAttribute('data-material');
                calculateQuick();
            });
        });

        // Sof m² va tezkor hisob
        function calculateQuick() {
            const eni = parseFloat(eniInput.value) || 0;
            const boy = parseFloat(boyiInput.value) || 0;

            if (eni > 0 && boy > 0) {
                const sqm = (eni * boy) / 10000;
                const currentPrice = dbPrices[activeMaterial] || 0;
                const totalCost = sqm * currentPrice;
                quickResult.innerHTML = `<p>📐 <b>${sqm.toFixed(2)} m²</b> | 💰 <b>${Math.round(totalCost).toLocaleString()} so'm</b></p>`;
            } else {
                quickResult.innerHTML = `<p>O'lchamlarni kiriting...</p>`;
            }
        }

        eniInput.addEventListener('input', calculateQuick);
        boyiInput.addEventListener('input', calculateQuick);

        // QARZLARNI TEKSHIRISH VA BILDIRIShNOMA CHIQARISh MANTIQI
        async function checkDebts() {
            try {
                let { data, error } = await supabase.from('debts').select('amount').eq('status', 'To\'lanmagan');
                if (!error && data) {
                    let totalDebtSum = data.reduce((sum, item) => sum + item.amount, 0);
                    
                    if (totalDebtSum > 0) {
                        // Asosiy ekrandagi eslatma matni
                        document.getElementById('mainDebtAlert').style.display = 'flex';
                        document.getElementById('mainDebtText').innerText = `⚠️ Diqqat: Tizimda ${totalDebtSum.toLocaleString()} so'm faol qarz bor!`;
                        
                        // Admin paneldagi ichki bildirishnoma
                        const panelAlert = document.getElementById('panelDebtAlert');
                        panelAlert.style.display = 'flex';
                        panelAlert.innerHTML = `<p>🔴 Jami faol qarz miqdori: <b>${totalDebtSum.toLocaleString()} so'm</b></p>`;
                    } else {
                        document.getElementById('mainDebtAlert').style.display = 'none';
                        document.getElementById('panelDebtAlert').style.display = 'none';
                    }
                }
            } catch (err) { console.log(err); }
        }

        // Narxlarni yuklash
        async function fetchPrices() {
            try {
                let { data, error } = await supabase.from('material_prices').select('*');
                if (!error && data && data.length > 0) {
                    data.forEach(item => {
                        dbPrices[item.material_name] = item.price;
                        document.getElementById(`price-${item.material_name}`).value = item.price;
                    });
                    calculateQuick();
                }
            } catch (err) { console.log(err); }
        }

        // Narxlarni saqlash
        document.getElementById('savePricesBtn').addEventListener('click', async () => {
            const materials = ['banner', 'arakal', 'setka'];
            for (const mat of materials) {
                const inputVal = parseFloat(document.getElementById(`price-${mat}`).value);
                if (inputVal > 0) {
                    dbPrices[mat] = inputVal;
                    await supabase.from('material_prices').upsert({ material_name: mat, price: inputVal }, { onConflict: 'material_name' });
                }
            }
            alert("Narxlar muvaffaqiyatli saqlandi!");
            closeSettings();
            calculateQuick();
        });

        // Mustaqil qarz kiritish paneli buyrug'i
        document.getElementById('saveDebtBtn').addEventListener('click', async () => {
            const client = document.getElementById('debt-client').value.trim();
            const amount = parseFloat(document.getElementById('debt-amount').value) || 0;

            if (!client || amount <= 0) {
                alert("Mijoz ismi va to'g'ri summani kiriting!");
                return;
            }

            const { error } = await supabase.from('debts').insert([{ client_name: client, amount: amount }]);
            if (!error) {
                alert("Qarz muvaffaqiyatli yuklandi!");
                document.getElementById('debt-client').value = '';
                document.getElementById('debt-amount').value = '';
                checkDebts();
            }
        });

        // Jami m² hisobotini yangilash
        async function updateStats() {
            try {
                let { data, error } = await supabase.from('orders').select('material, sqm');
                if (!error && data) {
                    let totals = { banner: 0, arakal: 0, setka: 0 };
                    data.forEach(order => { if (totals[order.material] !== undefined) totals[order.material] += order.sqm; });
                    document.getElementById('stat-banner').innerText = `${totals.banner.toFixed(2)} m²`;
                    document.getElementById('stat-arakal').innerText = `${totals.arakal.toFixed(2)} m²`;
                    document.getElementById('stat-setka').innerText = `${totals.setka.toFixed(2)} m²`;
                }
            } catch (err) { console.log(err); }
        }

        // Buyurtma yuklash va qarzni avtomat tekshirish mantiqi
        document.getElementById('submitOrderBtn').addEventListener('click', async () => {
            const eni = parseFloat(eniInput.value) || 0;
            const boy = parseFloat(boyiInput.value) || 0;
            const client = clientInput.value.trim() || "Noma'lum";
            const status = statusSelect.value;

            if (eni <= 0 || boy <= 0) {
                alert("O'lchamlarni to'g'ri kiriting!");
                return;
            }

            const sqm = (eni * boy) / 10000;
            const currentPrice = dbPrices[activeMaterial] || 0;
            const totalCost = sqm * currentPrice;

            // 1. Buyurtmani bazaga yuklash
            const { error: orderError } = await supabase.from('orders').insert([
                { material: activeMaterial, width: eni, height: boy, sqm: sqm, total_price: Math.round(totalCost), client_name: client, status: status }
            ]);

            // 2. Agar holat "Qarz" qilib tanlangan bo'lsa, qarzlar jadvaliga ham avtomat yozish
            if (status === "Qarz") {
                await supabase.from('debts').insert([
                    { client_name: client, amount: Math.round(totalCost), description: `${activeMaterial} uchun buyurtma` }
                ]);
            }

            if (!orderError) {
                alert("Ma'lumotlar yuklandi! 🎉");
                eniInput.value = '';
                boyiInput.value = '';
                clientInput.value = '';
                quickResult.innerHTML = `<p>O'lchamlarni kiriting...</p>`;
                updateStats();
                checkDebts();
            } else {
                alert("Xatolik: " + orderError.message);
            }
        });

        // Dastlabki ishga tushirish buyruqlari
        fetchPrices();
        updateStats();
        checkDebts();
    </script>
</body>
</html>
